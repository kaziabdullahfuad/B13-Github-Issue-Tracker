<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues</title>

    <!-- DaisyUI and Tailwind CSS -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- css linked -->
    <link rel="stylesheet" href="./style/style.css">

    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
</head>
<body>
    
    <header class="bg-white shadow-md py-4">
        <nav class="w-11/12 mx-auto flex flex-col md:flex-row justify-between items-center">
            <div class="flex items-center gap-1">
                <img class="max-w-9" src="./assets/github-logo.png" alt="">
                <h2 class="font-semibold text-2xl text-[#1F2937]">GitHub Issues Tracker</h2>
            </div>

            <div class="flex flex-col md:flex-row gap-3">
                <!-- <input style="font-family: 'Font Awesome 5 Free'; font-weight: 700;" type="text" name="" id="" placeholder="&#xf002; Search issues..." class="relative">                               -->
                <input class="py-2 px-3 rounded-md text-[#64748B]" type="text" placeholder="Search Issues">
                <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
            </div>
        </nav>
    </header>
    
    <section class=" md:w-10/12 mx-auto mt-14 mb-4 p-6 shadow-md rouned-md">
        <div class="flex gap-2">
            <button onclick="btnTabClicked('all-btn-tab')" id="all-btn-tab" class="bg-[#4A00FF] text-white font-semibold py-3 px-9 rounded-md cursor-pointer">All</button>
            <button  onclick="btnTabClicked('open-btn-tab')" id="open-btn-tab" class="bg-white shadow-md text-[#64748B] font-semibold py-3 px-9 rounded-md cursor-pointer">Open</button>
            <button  onclick="btnTabClicked('closed-btn-tab')" id="closed-btn-tab" class="bg-white shadow-md text-[#64748B] font-semibold py-3 px-9 rounded-md cursor-pointer">Closed</button>
            
        </div>
        
    </section>

   

    <section id="main-container" class=" md:w-10/12 mx-auto p-6 shadow-md flex justify-between items-center rounded-md">
        
        <div id="left-side-issues" class="flex gap-2 items-center">
            <div class="">
                
                <img src="./assets/Aperture.png" alt="">
            </div>
            <div>
                
                <h2 id="issue-count" class="text-[#1F2937] font-semibold text-xl">50 Issues</h2>
                <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>
        </div>

        <div id="right-side-open-closed" class="flex gap-4 items-center">
            <div class="flex gap-1 items-center">

                <div class="bg-[#00A96E] w-3 h-3 rounded-full">
                    
                </div>
                <p class="text-[#1F2937] font-medium">Open</p>
            </div>
            
            <div class="flex gap-1 items-center">

                <div class="bg-[#A855F7] w-3 h-3 rounded-full">
                    
                </div>
                <p class="text-[#1F2937] font-medium">Closed</p>
            </div>
        </div>
    </section>

   

    <section id="main-cards" class="md:w-10/12 mx-auto bg-[#FBFBFB] shadow-md rounded-b-md">

        <section id="spinner" class="flex justify-center items-center ">
            <span class="loading loading-spinner text-success"></span>
        </section>

        <div id="card-container" class="grid grid-cols-1 md:grid-cols-4 gap-4 p-6">
             


        </div>

    </section>
   
    <script src="./script/home.js"></script>

</body>
</html>
